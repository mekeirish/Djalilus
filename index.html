<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LD Holding</title>
    <style>
        /* Configuration de base pour smartphone */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e24;
            color: #e0e0e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            padding-bottom: 90px;
        }

        /* Conteneur principal */
        .app-container {
            width: 100%;
            max-width: 480px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Bouton admin jaune orangé */
        .btn-admin-toggle {
            position: absolute;
            top: 4px;
            right: 0;
            background: #ff9f43;
            color: #1e1e24;
            border: none;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 159, 67, 0.3);
        }

        .btn-admin-toggle.logged-in {
            background: #4caf50;
            color: white;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        /* Panneau de contrôle d'administration */
        .admin-dashboard-panel {
            display: none;
            width: 100%;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        body.is-admin .admin-dashboard-panel {
            display: grid;
        }

        .btn-admin-panel {
            background: #25252b;
            color: #ffffff;
            border: 1px solid #33333c;
            padding: 12px 6px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }

        .btn-admin-panel.active-tab {
            border-color: #ff9f43;
            color: #ff9f43;
        }

        /* Grille à deux colonnes */
        .grid-products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 16px;
            width: 100%;
            margin-bottom: 40px;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Style des carreaux */
        .tile {
            aspect-ratio: 1 / 1;
            background: #25252b;
            border-radius: 20px;
            border: 1px solid #2d2d35;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.05), 
                        4px 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .tile:not(.zoomed-in-active):active {
            transform: scale(0.97);
        }

        /* Bouton Ajouter (+) caché par défaut */
        .btn-add {
            font-size: 3rem;
            color: #4a4a5a;
            font-weight: 300;
            cursor: pointer;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        body.is-admin .btn-add {
            display: flex;
        }

        .tile.active .btn-add {
            color: #00adb5;
        }

        /* Image du produit avec transition fluide améliorée */
        .product-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            border-radius: 20px;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease;
            z-index: 1;
            transform-origin: center center;
        }

        /* Lightbox d'agrandissement propre sans interaction avec le fond */
        .product-bg.fullscreen-zoom {
            position: fixed;
            top: 50% !important;
            left: 50% !important;
            width: 90vw !important;
            height: auto !important;
            max-height: 80vh !important;
            object-fit: contain !important;
            z-index: 5000 !important;
            transform: translate(-50%, -50%) scale(1.05) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            pointer-events: auto !important;
        }

        /* Overlay sombre temporaire sous l'image zoomée */
        .zoom-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 15, 18, 0.9);
            z-index: 4999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .zoom-backdrop.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Zone d'informations sous le carré */
        .product-meta {
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .product-name-line {
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .product-details-line {
            font-size: 0.8rem;
            color: #b0b0b8;
        }

        /* Boutons d'actions */
        .product-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-qty-action {
            flex: 1;
            background: #33333c;
            color: #ffffff;
            border: 1px solid #444450;
            border-radius: 8px;
            padding: 6px 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-cart-action {
            background: #00adb5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }

        .btn-cart-action.disabled {
            background: #3a3a44;
            color: #6a6a75;
            cursor: not-allowed;
        }

        /* Structure Modale haute */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 18, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 90%;
            max-width: 440px;
            background: #25252b;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
            transform: translateY(-50px);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #ffffff;
            text-align: center;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a0a0aa;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: #1e1e24;
            border: 1px solid #33333c;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: #00adb5;
        }

        textarea.form-control {
            resize: none;
            height: 80px;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            background: #1e1e24;
            border: 1px dashed #4a4a5a;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        .file-upload-text {
            font-size: 0.9rem;
            color: #00adb5;
        }

        .btn-submit {
            width: 100%;
            background: #00adb5;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 173, 181, 0.3);
        }

        /* Pavé numérique */
        .keypad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .keypad-display {
            width: 100%;
            background: #1e1e24;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: #ff9f43;
            margin-bottom: 20px;
            height: 58px;
            border: 1px solid #33333c;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }

        .keypad-btn {
            background: #1e1e24;
            color: #ffffff;
            border: 1px solid #33333c;
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }

        .keypad-btn:active {
            background: #ff9f43;
            color: #1e1e24;
        }

        .keypad-btn.clear {
            color: #ff4d4d;
            font-size: 0.9rem;
        }

        /* Structure d'une fiche Commande pour l'Admin */
        .order-card {
            background: #1e1e24;
            border: 1px solid #33333c;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed #33333c;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .order-client-name {
            font-weight: 700;
            color: #ffffff;
            font-size: 0.95rem;
        }

        .order-client-meta {
            font-size: 0.8rem;
            color: #a0a0aa;
            margin-top: 2px;
            line-height: 1.3;
        }

        .order-actions-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-order-call {
            background: #25252b;
            border: 1px solid #33333c;
            color: #ff9f43;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .btn-order-ok {
            flex: 1;
            background: #4caf50;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(76, 175, 80, 0.2);
        }

        /* Notification interne flottante */
        .toast-notification {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #4caf50;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 4000;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            text-align: center;
            white-space: nowrap;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-notification.warning {
            background: #ff4d4d;
        }

        /* Barre de commande tout en bas fixe */
        .checkout-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 480px;
            background: #25252b;
            border-top: 1px solid #2d2d35;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.4);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .checkout-bar.active {
            transform: translateX(-50%) translateY(0);
        }

        .btn-checkout-left {
            background: #33333c;
            color: #ffffff;
            border: 1px solid #444450;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .checkout-total-center {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ff9f43;
            text-align: center;
        }

        .btn-checkout-right {
            background: #4caf50;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        /* Structure du récapitulatif dans le panier */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #33333c;
            padding: 12px 0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 1;
            padding-right: 10px;
        }

        .cart-item-title {
            font-weight: 600;
            color: #ffffff;
            font-size: 0.95rem;
        }

        .cart-item-sub {
            font-size: 0.8rem;
            color: #a0a0aa;
            margin-top: 2px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #ff9f43;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 20px 0 10px 0;
            font-size: 0.75rem;
            color: #4a4a5a;
            letter-spacing: 0.5px;
        }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

    <!-- Fond protecteur d'isolation pour le zoom -->
    <div class="zoom-backdrop" id="zoomBackdrop" onclick="closeZoomedImage()"></div>

    <div class="app-container">
        <header>
            <h1>LD Holding</h1>
            <button class="btn-admin-toggle" id="adminToggleBtn" onclick="playHumSound(); handleAdminButtonClick()">Admin</button>
        </header>

        <!-- Menu d'onglets complémentaires pour l'Admin -->
        <div class="admin-dashboard-panel" id="adminDashboardPanel">
            <button class="btn-admin-panel" onclick="playHumSound(); openAdminOrdersModal('new')">Nouvelles commandes</button>
            <button class="btn-admin-panel" onclick="playHumSound(); openAdminOrdersModal('done')">Commandes traitées</button>
            <button class="btn-admin-panel" style="border-color:#4a4a5a;color:#a0a0aa;" onclick="playHumSound(); alert('Mode ajout actif : utilisez le bouton (+) disponible au bas du catalogue de produits.')">Ajouter Produit</button>
        </div>

        <main class="grid-products" id="gridProducts">
            <!-- Injecté dynamiquement -->
        </main>

        <footer>
            Laiche Mohamed Abdeldjalil 2026
        </footer>
    </div>

    <!-- Barre de commande en bas -->
    <div class="checkout-bar" id="checkoutBar">
        <button class="btn-checkout-left" onclick="playHumSound(); openCartModal()">Liste</button>
        <div class="checkout-total-center" id="checkoutTotalDisplay">Total : 0.00 DZD</div>
        <button class="btn-checkout-right" onclick="playHumSound(); openCustomerDetailsModal()">Commander</button>
    </div>

    <!-- Notification flottante unique -->
    <div class="toast-notification" id="toastNotification">Produit ajouté au panier.</div>

    <!-- Modal Formulaire Nouveau Produit -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeProductModal(event)">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <div class="modal-title">Nouveau Produit</div>
            <form id="productForm" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label for="prodName">Nom du produit</label>
                    <input type="text" id="prodName" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="prodQty">Quantité dans le carton</label>
                    <input type="number" id="prodQty" class="form-control" required min="1" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label for="prodPrice">Prix (DZD)</label>
                    <input type="number" id="prodPrice" class="form-control" step="0.01" required min="0" inputmode="decimal">
                </div>
                <div class="file-upload-wrapper" onclick="playHumSound()">
                    <span class="file-upload-text" id="uploadStatus">📸 Ajouter une photo</span>
                    <input type="file" id="prodImage" accept="image/*" onchange="handleFileChange(event)">
                </div>
                <button type="submit" class="btn-submit" onclick="playHumSound()">Valider</button>
            </form>
        </div>
    </div>

    <!-- Modal Pavé Numérique Interne -->
    <div class="modal-overlay" id="keypadOverlay" onclick="closeKeypadModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" id="keypadTitle" style="color: #ff9f43;">Code Administrateur</div>
            <div class="keypad-container">
                <div class="keypad-display" id="keypadDisplay"></div>
                <div class="keypad-grid">
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('1')">1</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('2')">2</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('3')">3</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('4')">4</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('5')">5</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('6')">6</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('7')">7</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('8')">8</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('9')">9</div>
                    <div class="keypad-btn clear" onclick="playHumSound(); pressKey('C')">C</div>
                    <div class="keypad-btn" onclick="playHumSound(); pressKey('0')">0</div>
                    <div class="keypad-btn" style="color: #4caf50; font-size: 1.5rem;" onclick="playHumSound(); pressKey('E')">✓</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Liste du Panier -->
    <div class="modal-overlay" id="cartModalOverlay" onclick="closeCartModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" style="color: #00adb5;">Détails de votre Panier</div>
            <div id="cartItemsContainer" style="margin-bottom: 20px;">
                <!-- Injecté dynamiquement -->
            </div>
            <button class="btn-submit" style="background: #33333c; box-shadow: none;" onclick="playHumSound(); closeCartModal()">Fermer</button>
        </div>
    </div>

    <!-- Modal Tunnel de Commande Formulaire Client -->
    <div class="modal-overlay" id="customerDetailsOverlay" onclick="closeCustomerDetailsModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" style="color: #4caf50;">Informations de Livraison</div>
            <form id="customerForm" onsubmit="handleCustomerFormSubmit(event)">
                <div class="form-group">
                    <label for="custName">Nom / Entreprise</label>
                    <input type="text" id="custName" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="custPhone">Téléphone</label>
                    <input type="tel" id="custPhone" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="custAddress">Adresse</label>
                    <input type="text" id="custAddress" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="custComment">Commentaire / Instructions spécifiques</label>
                    <textarea id="custComment" class="form-control" autocomplete="off"></textarea>
                </div>
                <button type="submit" class="btn-submit" style="background: #4caf50; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);" onclick="playHumSound()">Valider la commande</button>
            </form>
        </div>
    </div>

    <!-- Modal Consultation Commandes Admin (Nouvelles / Traitées) -->
    <div class="modal-overlay" id="adminOrdersOverlay" onclick="closeAdminOrdersModal()">
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 460px;">
            <div class="modal-title" id="adminOrdersTitle" style="color: #ff9f43;">Commandes</div>
            <div id="adminOrdersContainer" style="margin-bottom: 20px;">
                <!-- Injecté dynamiquement -->
            </div>
            <button class="btn-submit" style="background: #33333c; box-shadow: none;" onclick="playHumSound(); closeAdminOrdersModal()">Fermer</button>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('savedProducts')) || [];
        let cart = []; 
        let adminOrders = JSON.parse(localStorage.getItem('adminOrders')) || []; 
        let selectedImageDataUrl = "";
        let isAdmin = false;
        let enteredCode = "";
        let keypadMode = "admin";
        let activeQtyProductId = null;
        let zoomedImageElement = null; // Stocke l'élément en cours de zoom

        const modalOverlay = document.getElementById('modalOverlay');
        const keypadOverlay = document.getElementById('keypadOverlay');
        const keypadDisplay = document.getElementById('keypadDisplay');
        const keypadTitle = document.getElementById('keypadTitle');
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const adminDashboardPanel = document.getElementById('adminDashboardPanel');
        const gridProducts = document.getElementById('gridProducts');
        const productForm = document.getElementById('productForm');
        const uploadStatus = document.getElementById('uploadStatus');
        
        const checkoutBar = document.getElementById('checkoutBar');
        const checkoutTotalDisplay = document.getElementById('checkoutTotalDisplay');
        const toastNotification = document.getElementById('toastNotification');
        const cartModalOverlay = document.getElementById('cartModalOverlay');
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const customerDetailsOverlay = document.getElementById('customerDetailsOverlay');
        const customerForm = document.getElementById('customerForm');

        const adminOrdersOverlay = document.getElementById('adminOrdersOverlay');
        const adminOrdersTitle = document.getElementById('adminOrdersTitle');
        const adminOrdersContainer = document.getElementById('adminOrdersContainer');
        const zoomBackdrop = document.getElementById('zoomBackdrop');

        // Audio Synth : Hum Générateur Industriel
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playHumSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const duration = 0.250;
            const masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.3, now);
            masterGain.gain.setValueAtTime(0.3, now + duration - 0.01);
            masterGain.gain.linearRampToValueAtTime(0, now + duration);
            const osc1 = audioCtx.createOscillator(); osc1.type = 'sine'; osc1.frequency.setValueAtTime(100, now);
            const osc2 = audioCtx.createOscillator(); osc2.type = 'sine'; osc2.frequency.setValueAtTime(200, now);
            osc1.connect(masterGain); osc2.connect(masterGain); masterGain.connect(audioCtx.destination);
            osc1.start(now); osc2.start(now); osc1.stop(now + duration); osc2.stop(now + duration);
        }

        // Gestion de l'agrandissement d'image isolé et ultra-fluide
        function toggleImageZoom(imgElement, event) {
            if (event) event.stopPropagation(); // Stoppe la propagation immédiate vers le carreau
            playHumSound();

            if (imgElement.classList.contains('fullscreen-zoom')) {
                closeZoomedImage();
            } else {
                if (zoomedImageElement) closeZoomedImage(); // Ferme un ancien zoom si existant
                zoomedImageElement = imgElement;
                
                // Marque le carreau parent pour désactiver les comportements d'échelle :active
                const tileParent = imgElement.closest('.tile');
                if (tileParent) tileParent.classList.add('zoomed-in-active');

                zoomBackdrop.classList.add('visible');
                imgElement.classList.add('fullscreen-zoom');
            }
        }

        function closeZoomedImage() {
            if (zoomedImageElement) {
                playHumSound();
                const tileParent = zoomedImageElement.closest('.tile');
                if (tileParent) tileParent.classList.remove('zoomed-in-active');

                zoomedImageElement.classList.remove('fullscreen-zoom');
                zoomedImageElement = null;
            }
            zoomBackdrop.classList.remove('visible');
        }

        function renderGrid() {
            gridProducts.innerHTML = "";
            products.forEach((product) => {
                const hasQty = product.selectedQty && product.selectedQty > 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="tile">
                        ${product.image ? `<img src="${product.image}" class="product-bg" onclick="toggleImageZoom(this, event)" alt="">` : ''}
                    </div>
                    <div class="product-meta">
                        <div class="product-name-line">${product.name}</div>
                        <div class="product-details-line">${parseFloat(product.price).toFixed(2)} DZD - Pack: ${product.qty}</div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-qty-action" onclick="playHumSound(); openQuantityKeypad(${product.id})">
                            ${hasQty ? `Quantité: ${product.selectedQty}` : 'Quantité'}
                        </button>
                        <button class="btn-cart-action ${!hasQty ? 'disabled' : ''}" onclick="playHumSound(); addToCart(${product.id})">🛒</button>
                    </div>
                `;
                gridProducts.appendChild(card);
            });

            const nextIndex = products.length;
            const addCard = document.createElement('div');
            addCard.className = 'product-card';
            addCard.innerHTML = `
                <div class="tile active" id="tile-${nextIndex}">
                    <div class="btn-add" onclick="playHumSound(); openProductModal(${nextIndex})">+</div>
                </div>
            `;
            gridProducts.appendChild(addCard);
        }

        function handleAdminButtonClick() {
            if (isAdmin) {
                isAdmin = false;
                document.body.classList.remove('is-admin');
                adminToggleBtn.textContent = "Admin";
                adminToggleBtn.classList.remove('logged-in');
            } else {
                keypadMode = "admin"; keypadTitle.textContent = "Code Administrateur";
                keypadTitle.style.color = "#ff9f43"; enteredCode = "";
                keypadDisplay.textContent = ""; keypadOverlay.classList.add('open');
            }
        }

        function openQuantityKeypad(productId) {
            keypadMode = "quantity"; activeQtyProductId = productId;
            keypadTitle.textContent = "Saisir Quantité"; keypadTitle.style.color = "#00adb5";
            enteredCode = ""; keypadDisplay.textContent = ""; keypadOverlay.classList.add('open');
        }

        function closeKeypadModal() { keypadOverlay.classList.remove('open'); }

        function pressKey(key) {
            if (key === 'C') {
                enteredCode = ""; keypadDisplay.textContent = "";
            } else if (key === 'E') {
                if (keypadMode === "admin") {
                    if (enteredCode === "1212") {
                        isAdmin = true; document.body.classList.add('is-admin');
                        adminToggleBtn.textContent = "✓ Admin"; adminToggleBtn.classList.add('logged-in');
                        closeKeypadModal();
                    } else {
                        keypadDisplay.textContent = "ERREUR"; enteredCode = "";
                        setTimeout(() => { keypadDisplay.textContent = ""; }, 800);
                    }
                } else if (keypadMode === "quantity") {
                    if (enteredCode.length > 0 && parseInt(enteredCode) > 0) {
                        const targetProd = products.find(p => p.id === activeQtyProductId);
                        if (targetProd) {
                            targetProd.selectedQty = parseInt(enteredCode);
                            localStorage.setItem('savedProducts', JSON.stringify(products));
                            renderGrid();
                        }
                        closeKeypadModal();
                    }
                }
            } else {
                if (keypadMode === "admin" && enteredCode.length < 4) {
                    enteredCode += key; keypadDisplay.textContent = "*".repeat(enteredCode.length);
                } else if (keypadMode === "quantity" && enteredCode.length < 5) {
                    enteredCode += key; keypadDisplay.textContent = enteredCode;
                }
            }
        }

        function openProductModal(index) { modalOverlay.classList.add('open'); }
        function closeProductModal(event) { modalOverlay.classList.remove('open'); resetForm(); }

        function handleFileChange(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageDataUrl = e.target.result;
                    uploadStatus.textContent = "✓ Image chargée"; uploadStatus.style.color = "#4caf50";
                };
                reader.readAsDataURL(file);
            }
        }

        function resetForm() {
            productForm.reset(); selectedImageDataUrl = "";
            uploadStatus.textContent = "📸 Ajouter une photo"; uploadStatus.style.color = "#00adb5";
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            const name = document.getElementById('prodName').value;
            const qty = document.getElementById('prodQty').value;
            const price = document.getElementById('prodPrice').value;

            const newProduct = {
                id: Date.now(), name: name, qty: qty, price: price, image: selectedImageDataUrl, selectedQty: 0
            };
            products.push(newProduct);
            localStorage.setItem('savedProducts', JSON.stringify(products));
            renderGrid();
            modalOverlay.classList.remove('open');
            resetForm();
        }

        function addToCart(productId) {
            const prod = products.find(p => p.id === productId);
            if (!prod) return;

            const qtyToOrder = prod.selectedQty || 0;
            if (qtyToOrder <= 0) {
                showToastNotification("Veuillez d'abord saisir une quantité !", true);
                return;
            }

            const itemPrice = parseFloat(prod.price);
            const totalItemPrice = itemPrice * qtyToOrder;

            const existingIndex = cart.findIndex(item => item.id === productId);
            if (existingIndex > -1) {
                cart[existingIndex].orderQty += qtyToOrder;
                cart[existingIndex].totalItemPrice += totalItemPrice;
            } else {
                cart.push({
                    id: prod.id,
                    name: prod.name,
                    price: itemPrice,
                    orderQty: qtyToOrder,
                    totalItemPrice: totalItemPrice
                });
            }

            updateCheckoutBar();
            showToastNotification("Produit ajouté au panier.", false);
        }

        function showToastNotification(message, isWarning = false) {
            toastNotification.textContent = message;
            if (isWarning) {
                toastNotification.classList.add('warning');
            } else {
                toastNotification.classList.remove('warning');
            }
            toastNotification.classList.add('show');
            setTimeout(() => {
                toastNotification.classList.remove('show');
            }, 2000);
        }

        function updateCheckoutBar() {
            if (cart.length > 0) {
                let totalGlobal = cart.reduce((sum, item) => sum + item.totalItemPrice, 0);
                checkoutTotalDisplay.textContent = "Total : " + totalGlobal.toFixed(2) + " DZD";
                checkoutBar.classList.add('active');
            } else {
                checkoutBar.classList.remove('active');
            }
        }

        function openCartModal() {
            cartItemsContainer.innerHTML = "";
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<div style="text-align:center;color:#a0a0aa;padding:20px 0;">Le panier est vide</div>`;
            } else {
                cart.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'cart-item';
                    row.innerHTML = `
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-sub">Quantité: ${item.orderQty} × ${item.price.toFixed(2)} DZD</div>
                        </div>
                        <div class="cart-item-price">${item.totalItemPrice.toFixed(2)} DZD</div>
                    `;
                    cartItemsContainer.appendChild(row);
                });
            }
            cartModalOverlay.classList.add('open');
        }

        function closeCartModal() { cartModalOverlay.classList.remove('open'); }

        function openCustomerDetailsModal() {
            if (cart.length === 0) return;
            closeCartModal();
            customerDetailsOverlay.classList.add('open');
        }

        function closeCustomerDetailsModal() {
            customerDetailsOverlay.classList.remove('open');
            customerForm.reset();
        }

        function handleCustomerFormSubmit(event) {
            event.preventDefault();
            
            const clientInfo = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                comment: document.getElementById('custComment').value
            };

            const finalOrder = {
                orderId: Date.now(),
                status: 'new',
                client: clientInfo,
                items: [...cart],
                total: cart.reduce((sum, item) => sum + item.totalItemPrice, 0),
                date: new Date().toLocaleDateString('fr-FR', {hour: '2-digit', minute:'2-digit'})
            };

            adminOrders.push(finalOrder);
            localStorage.setItem('adminOrders', JSON.stringify(adminOrders));

            cart = [];
            products.forEach(p => p.selectedQty = 0);
            localStorage.setItem('savedProducts', JSON.stringify(products));
            
            updateCheckoutBar();
            renderGrid();
            closeCustomerDetailsModal();

            setTimeout(() => {
                showToastNotification("Commande validée et transmise à l'admin !", false);
            }, 300);
        }

        function openAdminOrdersModal(filterType) {
            adminOrdersContainer.innerHTML = "";
            
            if (filterType === 'new') {
                adminOrdersTitle.textContent = "Nouvelles commandes";
                adminOrdersTitle.style.color = "#ff9f43";
            } else {
                adminOrdersTitle.textContent = "Commandes traitées";
                adminOrdersTitle.style.color = "#4caf50";
            }

            const filtered = adminOrders.filter(o => o.status === filterType);

            if (filtered.length === 0) {
                adminOrdersContainer.innerHTML = `<div style="text-align:center;color:#a0a0aa;padding:30px 0;">Aucune commande dans cette section</div>`;
            } else {
                filtered.forEach(order => {
                    const card = document.createElement('div');
                    card.className = 'order-card';
                    
                    let productsHtml = order.items.map(i => 
                        `<div style="font-size:0.85rem; color:#e0e0e6; margin-bottom:2px;">• ${i.name} (×${i.orderQty}) - ${i.totalItemPrice.toFixed(2)} DZD</div>`
                    ).join('');

                    card.innerHTML = `
                        <div class="order-card-header">
                            <div>
                                <div class="order-client-name">${order.client.name}</div>
                                <div class="order-client-meta">
                                    📍 ${order.client.address}<br>
                                    🕒 ${order.date}
                                </div>
                            </div>
                            <div style="font-weight:700; color:#ff9f43; font-size:0.95rem;">${order.total.toFixed(2)} DZD</div>
                        </div>
                        <div style="margin:8px 0; padding-left:4px;">
                            ${productsHtml}
                        </div>
                        ${order.client.comment ? `<div style="font-size:0.8rem; background:#25252b; padding:6px 10px; border-radius:8px; color:#b0b0b8; font-style:italic; margin-top:6px;">💬 ${order.client.comment}</div>` : ''}
                        
                        ${filterType === 'new' ? `
                            <div class="order-actions-row">
                                <a href="tel:${order.client.phone}" class="btn-order-call" onclick="playHumSound()">📞</a>
                                <button class="btn-order-ok" onclick="playHumSound(); markOrderAsDone(${order.orderId})">OK</button>
                            </div>
                        ` : ''}
                    `;
                    adminOrdersContainer.appendChild(card);
                });
            }
            adminOrdersOverlay.classList.add('open');
        }

        function closeAdminOrdersModal() { adminOrdersOverlay.classList.remove('open'); }

        function markOrderAsDone(orderId) {
            const target = adminOrders.find(o => o.orderId === orderId);
            if (target) {
                target.status = 'done';
                localStorage.setItem('adminOrders', JSON.stringify(adminOrders));
                openAdminOrdersModal('new'); 
                showToastNotification("Commande déplacée vers traitées.", false);
            }
        }

        // Initialisation globale
        renderGrid();
    </script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
